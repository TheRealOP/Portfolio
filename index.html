<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ojas Polakhare | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Specific styles for the homepage layout */
        .container {
            max-width: 1100px;
        }
        h1 {
            font-size: 3rem;
        }
        h2 {
            font-size: 2.2rem;
        }
        header, footer {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
            background: transparent;
        }
        .logo {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            display: block;
            text-align: center;
        }
        .tiles {
            display: block;
            margin: 20px auto 0;
        }
        section > div {
            background: transparent;
            border: none;
            padding: 20px;
            border-radius: 0;
            box-shadow: none;
            margin: 0 auto 20px;
            max-width: 800px;
        }
        section > div:last-child {
            margin-bottom: 0;
        }
        #projects-list li a {
            display: block;
            padding: 8px 0;
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        #projects-list li a:hover {
            color: var(--accent);
        }
        #projects-list li:last-child a {
            border-bottom: none;
        }
        #experience a {
            color: var(--text);
        }
        #experience a:hover {
            color: var(--accent);
        }
    </style>
  </head>
  <body>
    <div class="ambient"></div>
    <div class="container">
      <button id="theme-toggle">Toggle Theme</button>

      <main>
        <section class="tiles">
          <div class="tile hero" id="top">
            <h1>Ojas Polakhare</h1>
            <p>Please hire me</p>
          </div>

          <div class="tile projects" id="projects">
            <h2>Projects</h2>
            <div id="projects-list">
              <!-- Projects will be displayed here dynamically -->
            </div>
          </div>

          <div class="tile experience" id="experience">
            <h2>Experience</h2>
            <ul>
              <li><a href="experience/jv-programming-team/">Junior Varsity Programming Team — University of Central Florida</a></li>
              <li><a href="experience/limb-ucf/">Undergraduate Research Assistant — LIMB@UCF</a></li>
            </ul>
          </div>

          <div class="tile about" id="about">
            <h2>About / Misc</h2>
            <p>Short bio, interests, or anything else you want to share.</p>
          </div>
        </section>


      </main>

      <footer>
        <p>&copy; 2026 Ojas Polakhare. All rights reserved.</p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
